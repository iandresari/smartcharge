name: Validate with HACS

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  schedule:
    - cron: "0 0 * * 0"

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate with HACS
    steps:
      - uses: actions/checkout@v4

      - name: HACS Action
        uses: hacs/action@main
        with:
          category: integration

  hassfest:
    runs-on: ubuntu-latest
    name: Hassfest
    steps:
      - uses: actions/checkout@v4

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin

      - name: Pull hassfest image
        run: |
          for i in 1 2 3; do
            docker pull ghcr.io/home-assistant/hassfest:latest && break
            echo "Pull failed (attempt $i), retrying in 60s..."
            sleep 60
          done

      - name: Run hassfest
        run: |
          docker run --rm -v "${{ github.workspace }}:/github/workspace" ghcr.io/home-assistant/hassfest:latest

  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8 black

      - name: Run Black
        run: black --check custom_components/smartcharge/

      - name: Run flake8
        run: flake8 custom_components/smartcharge/ --max-line-length=88
