name: Validate with HACS

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop
  schedule:
    - cron: "0 0 * * 0"

jobs:
  validate:
    runs-on: ubuntu-latest
    name: Validate with HACS
    steps:
      - uses: actions/checkout@v3

      - name: HACS Action
        uses: hacs/action@main
        with:
          category: integration
          ignore: missing-string,missing-version

  hassfest:
    runs-on: ubuntu-latest
    name: Hassfest
    steps:
      - uses: actions/checkout@v3

      - name: Hassfest Action
        uses: home-assistant/actions/hassfest@master

  style:
    runs-on: ubuntu-latest
    name: Check code style
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 isort mypy

      - name: Run Black
        run: black --check smartcharge/

      - name: Run isort
        run: isort --check-only smartcharge/

      - name: Run mypy
        run: mypy smartcharge/

  lint:
    runs-on: ubuntu-latest
    name: Lint
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Run flake8
        run: flake8 smartcharge/
