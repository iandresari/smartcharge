refresh_data:
  name: Refresh SmartCharge Data
  description: Manually refresh all charging station data from EnBW API

add_charging_point:
  name: Add Charging Point
  description: Add a new charging station to monitoring
  fields:
    station_id:
      name: Station ID
      description: The EnBW charging station ID (e.g., 986728)
      required: true
      selector:
        text:
    station_name:
      name: Station Name
      description: Display name for the charging station
      required: true
      selector:
        text:

remove_charging_point:
  name: Remove Charging Point
  description: Remove a charging station from monitoring
  fields:
    station_id:
      name: Station ID
      description: The EnBW charging station ID to remove
      required: true
      selector:
        text:
