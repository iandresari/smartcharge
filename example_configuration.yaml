# Example Home Assistant configuration file for testing

# Configure UI
homeassistant:
  name: Home Assistant with EnBW Charging
  latitude: 48.8566
  longitude: 2.3522
  elevation: 0
  unit_system: metric
  time_zone: Europe/Berlin
  customize:
    sensor.beg_abt_tor_5_occupancy:
      icon: mdi:percent
      friendly_name: "Occupancy %"

# Enable logging
logger:
  default: info
  logs:
    enbw_charging: debug
    homeassistant.components.enbw_charging: debug

# History for statistics
history:
  exclude:
    domains:
      - automation
      - script

# Database recorder (required for history statistics)
recorder:
  db_url: postgresql://homeassistant:homeassistant@postgres/homeassistant?sslmode=prefer
  purge_keep_days: 30

# Automations example
automation:
  - id: "notify_charging_available"
    alias: "Notify when charging available"
    description: "Send notification when charge point becomes available"
    trigger:
      - platform: state
        entity_id: binary_sensor.beg_abt_tor_5_de_rbo_eeeb0258_1001_available
        to: "on"
    action:
      - service: persistent_notification.create
        data:
          title: "🔋 Charging Available"
          message: "BEG Abt Tor 5 - Point 1 is now available for charging!"
          notification_id: "charging_available_1"

  - id: "notify_all_occupied"
    alias: "Alert all charging points occupied"
    description: "Notify when all charge points are occupied"
    trigger:
      - platform: state
        entity_id: sensor.beg_abt_tor_5_occupancy
        attribute: occupancy_weekday
    condition:
      - condition: numeric_state
        entity_id: sensor.beg_abt_tor_5_occupancy
        above: 90
    action:
      - service: persistent_notification.create
        data:
          title: "⚠️ Station Almost Full"
          message: "BEG Abt Tor 5 is {{ states('sensor.beg_abt_tor_5_occupancy') }}% occupied"
          notification_id: "station_almost_full"

# Template sensors for advanced use cases
template:
  - sensor:
      - name: "Available Charging Points BEG T5"
        unique_id: available_points_beg_t5
        unit_of_measurement: count
        state: >
          {% set available = [
            is_state('binary_sensor.beg_abt_tor_5_de_rbo_eeeb0258_1001_available', 'on'),
            is_state('binary_sensor.beg_abt_tor_5_de_rbo_eeeb0258_1002_available', 'on'),
            is_state('binary_sensor.beg_abt_tor_5_de_rbo_eeec0259_1001_available', 'on'),
            is_state('binary_sensor.beg_abt_tor_5_de_rbo_eeec0259_1002_available', 'on'),
            is_state('binary_sensor.beg_abt_tor_5_de_rbo_e10c40277_1001_available', 'on'),
            is_state('binary_sensor.beg_abt_tor_5_de_rbo_e10c40277_1002_available', 'on'),
          ] %}
          {{ available | select('equalto', True) | list | length }}

  - binary_sensor:
      - name: "BEG T5 Has Available Points"
        unique_id: beg_t5_has_available
        state: >
          {{ states('sensor.available_charging_points_beg_t5') | int(0) > 0 }}
        device_class: presence

# History statistics for daily/weekly analysis
history_stats:
  - platform: history_stats
    name: "BEG T5 Occupied Hours Today"
    entity_id: binary_sensor.beg_abt_tor_5_de_rbo_eeeb0258_1001_occupied
    state: "on"
    type: time
    period: day

  - platform: history_stats
    name: "BEG T5 Availability Today"
    entity_id: binary_sensor.beg_abt_tor_5_de_rbo_eeeb0258_1001_available
    state: "on"
    type: ratio
    period: day
